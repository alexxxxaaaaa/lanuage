name = "word-sprint-server"
main = "src/worker.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# D1 binding — replace database_id after running:
#   wrangler d1 create word-sprint-db
[[d1_databases]]
binding = "DB"
database_name = "word-sprint-db"
database_id = "REPLACE_WITH_D1_DATABASE_ID"
migrations_dir = "prisma/migrations"

# Vars vs secrets:
#   - JWT_SECRET, OPENAI_API_KEY: set via `wrangler secret put`
#   - OPENAI_MODEL: non-sensitive, can live here
[vars]
OPENAI_MODEL = "gpt-4.1-mini"
